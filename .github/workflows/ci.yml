name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-format-test:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: fitex
          POSTGRES_PASSWORD: fitex_test
          POSTGRES_DB: fitex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fitex"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier format check
        run: pnpm format

      - name: Lint
        run: pnpm lint

      - name: Test API
        run: pnpm --filter @fitex/api test
        env:
          DATABASE_URL: postgresql://fitex:fitex_test@localhost:5432/fitex_test

      - name: Build Web
        run: pnpm --filter @fitex/web build

      - name: Build API
        run: pnpm --filter @fitex/api build

      - name: Build Extension
        run: pnpm --filter @fitex/extension build

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-format-test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
